<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Run Log</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root {
      --bg:        #0d0d0f;
      --surface:   #141417;
      --border:    #1f1f24;
      --muted:     #3a3a42;
      --text-dim:  #6b6b78;
      --text:      #c8c8d4;
      --text-hi:   #eeeef4;
      --accent:    #e8ff5a;       /* sharp acid-yellow — finish-line tape */
      --accent2:   #ff6b35;       /* ember orange — exertion */
      --treadmill: #4a9eff;
      --font-display: 'Syne', sans-serif;
      --font-body:    'Inter', sans-serif;
      --font-mono:    'DM Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 2rem 2rem 1.5rem;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .logo {
      font-family: var(--font-display);
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      color: var(--text-hi);
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .logo span {
      color: var(--accent);
    }

    .last-updated {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* ── Layout ── */
    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
      display: grid;
      gap: 1.5rem;
    }

    /* ── Stat strip ── */
    .stat-strip {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
    }

    .stat {
      background: var(--surface);
      padding: 1.25rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .stat-label {
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
    }

    .stat-value {
      font-family: var(--font-display);
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      font-weight: 700;
      color: var(--text-hi);
      line-height: 1;
    }

    .stat-value.accent { color: var(--accent); }
    .stat-sub {
      font-size: 11px;
      color: var(--text-dim);
      font-family: var(--font-mono);
    }

    /* ── Section grid ── */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    @media (max-width: 900px) {
      .grid-2 { grid-template-columns: 1fr; }
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1.5rem;
    }

    .card-title {
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .card-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Recent runs table ── */
    .runs-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .runs-table th {
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      text-align: left;
      padding: 0 0.75rem 0.75rem 0;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    .runs-table td {
      padding: 0.6rem 0.75rem 0.6rem 0;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      vertical-align: middle;
    }

    .runs-table tr:last-child td { border-bottom: none; }

    .runs-table tr:hover td { color: var(--text-hi); }

    .run-name {
      font-weight: 500;
      color: var(--text-hi);
      max-width: 180px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .badge {
      display: inline-block;
      font-family: var(--font-mono);
      font-size: 9px;
      padding: 1px 6px;
      border-radius: 2px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .badge-outdoor { background: rgba(232,255,90,0.12); color: var(--accent); }
    .badge-treadmill { background: rgba(74,158,255,0.12); color: var(--treadmill); }

    .mono { font-family: var(--font-mono); }

    /* ── Charts ── */
    .chart-wrap {
      position: relative;
      height: 220px;
    }

    /* ── Year bar ── */
    .year-progress {
      margin-top: 0.5rem;
    }

    .year-bar-track {
      height: 6px;
      background: var(--muted);
      border-radius: 3px;
      overflow: hidden;
      margin: 0.5rem 0;
    }

    .year-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      transition: width 1s ease;
    }

    .year-bar-labels {
      display: flex;
      justify-content: space-between;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
    }

    /* ── Streak viz ── */
    .streak-row {
      display: flex;
      gap: 3px;
      flex-wrap: wrap;
      margin-top: 0.5rem;
    }

    .streak-dot {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      background: var(--muted);
    }

    .streak-dot.active { background: var(--accent); }
    .streak-dot.current { background: var(--accent2); }

    /* ── Loading / error ── */
    .loading {
      text-align: center;
      padding: 4rem 2rem;
      font-family: var(--font-mono);
      color: var(--text-dim);
      font-size: 12px;
      letter-spacing: 0.1em;
    }

    .pulse {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1.2s ease-in-out infinite;
      margin-right: 0.5rem;
      vertical-align: middle;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.3; transform: scale(0.6); }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">RUN<span>LOG</span></div>
  <div class="last-updated" id="last-updated">Loading…</div>
</header>

<main id="app">
  <div class="loading"><span class="pulse"></span>Fetching run data…</div>
</main>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const RUNS_CSV    = 'runs.csv';
const SUMMARY_JSON = 'summary.json';

// ── Helpers ─────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);

function fmt(n, dec = 1) {
  if (n === null || n === undefined || n === '') return '—';
  return Number(n).toFixed(dec);
}

function weekLabel(dateStr) {
  const d = new Date(dateStr);
  const jan4 = new Date(d.getFullYear(), 0, 4);
  const week = Math.ceil(((d - jan4) / 86400000 + jan4.getDay() + 1) / 7);
  return `W${week}`;
}

function isoWeek(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const jan4 = new Date(d.getFullYear(), 0, 4);
  const week = Math.ceil(((d - jan4) / 86400000 + jan4.getDay() + 1) / 7);
  return `${d.getFullYear()}-W${String(week).padStart(2,'0')}`;
}

function paceToSec(paceStr) {
  if (!paceStr) return null;
  const [m, s] = paceStr.split(':').map(Number);
  return m * 60 + (s || 0);
}

function secToPace(s) {
  if (!s) return '—';
  return `${Math.floor(s/60)}:${String(Math.round(s%60)).padStart(2,'0')}`;
}

// ── Chart defaults ───────────────────────────────────────────────────────────
Chart.defaults.color = '#6b6b78';
Chart.defaults.borderColor = '#1f1f24';
Chart.defaults.font.family = "'DM Mono', monospace";
Chart.defaults.font.size = 10;

function chartOpts(extra = {}) {
  return {
    responsive: true,
    maintainAspectRatio: false,
    plugins: { legend: { display: false }, tooltip: {
      backgroundColor: '#141417',
      borderColor: '#1f1f24',
      borderWidth: 1,
      titleColor: '#eeeef4',
      bodyColor: '#c8c8d4',
      padding: 10,
    }},
    scales: {
      x: { grid: { color: '#1f1f24' }, ticks: { maxRotation: 0 } },
      y: { grid: { color: '#1f1f24' } }
    },
    ...extra
  };
}

// ── Main render ──────────────────────────────────────────────────────────────
async function init() {
  const [runsRaw, summary] = await Promise.all([
    fetch(RUNS_CSV).then(r => r.text()),
    fetch(SUMMARY_JSON).then(r => r.json()).catch(() => null)
  ]);

  const { data: rows } = Papa.parse(runsRaw, { header: true, skipEmptyLines: true });
  const runs = rows.filter(r => r.date);

  render(runs, summary);
}

function render(runs, summary) {
  const app = $('app');
  app.innerHTML = '';

  // last updated
  if (summary) {
    $('last-updated').textContent = `Updated ${summary.last_updated}`;
  }

  // ── Stat strip ──────────────────────────────────────────────────────────
  const thisYear = new Date().getFullYear().toString();
  const yearRuns = runs.filter(r => r.date.startsWith(thisYear));
  const yearDist = yearRuns.reduce((s, r) => s + (parseFloat(r.distance_km) || 0), 0);

  const allDist = runs.reduce((s, r) => s + (parseFloat(r.distance_km) || 0), 0);

  const strip = document.createElement('div');
  strip.className = 'stat-strip';
  strip.innerHTML = `
    <div class="stat">
      <span class="stat-label">Runs ${thisYear}</span>
      <span class="stat-value accent">${summary?.total_runs_this_year ?? yearRuns.length}</span>
      <span class="stat-sub">${summary?.total_runs_all_time ?? runs.length} all time</span>
    </div>
    <div class="stat">
      <span class="stat-label">Distance ${thisYear}</span>
      <span class="stat-value">${fmt(summary?.total_distance_this_year_km ?? yearDist, 0)} <small style="font-size:1rem;color:var(--text-dim)">km</small></span>
      <span class="stat-sub">${fmt(allDist, 0)} km all time</span>
    </div>
    <div class="stat">
      <span class="stat-label">Weekly streak</span>
      <span class="stat-value accent">${summary?.current_weekly_streak ?? '—'} <small style="font-size:1rem;color:var(--text-dim)">wks</small></span>
      <span class="stat-sub">Best: ${summary?.longest_weekly_streak ?? '—'} weeks</span>
    </div>
    <div class="stat">
      <span class="stat-label">Avg / week</span>
      <span class="stat-value">${summary?.avg_runs_per_week_this_year ?? '—'}</span>
      <span class="stat-sub">runs per week ${thisYear}</span>
    </div>
    <div class="stat">
      <span class="stat-label">Last run</span>
      <span class="stat-value" style="font-size:1.4rem">${runs[0]?.date ?? '—'}</span>
      <span class="stat-sub">${fmt(runs[0]?.distance_km)} km · ${runs[0]?.avg_pace_min_km ?? '—'} /km</span>
    </div>
  `;
  app.appendChild(strip);

  // ── Recent runs + yearly progress ────────────────────────────────────────
  const grid1 = document.createElement('div');
  grid1.className = 'grid-2';

  // Recent runs table
  const recentCard = document.createElement('div');
  recentCard.className = 'card';
  const recent10 = runs.slice(0, 10);
  recentCard.innerHTML = `
    <div class="card-title">Recent runs</div>
    <table class="runs-table">
      <thead>
        <tr>
          <th>Date</th>
          <th>Name</th>
          <th>Dist</th>
          <th>Pace</th>
          <th>HR</th>
          <th>Load</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        ${recent10.map(r => `
          <tr>
            <td class="mono" style="color:var(--text-dim);white-space:nowrap">${r.date}</td>
            <td class="run-name">${r.name || '—'}</td>
            <td class="mono">${fmt(r.distance_km)} km</td>
            <td class="mono">${r.avg_pace_min_km || '—'}</td>
            <td class="mono">${r.avg_hr || '—'}</td>
            <td class="mono">${r.training_load ? fmt(r.training_load, 0) : '—'}</td>
            <td><span class="badge badge-${r.type}">${r.type}</span></td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
  grid1.appendChild(recentCard);

  // Yearly distance progress
  const yearCard = document.createElement('div');
  yearCard.className = 'card';
  const targetKm = 2000;
  const pct = Math.min(100, (yearDist / targetKm) * 100);

  // Monthly breakdown
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const monthDist = Array(12).fill(0);
  yearRuns.forEach(r => {
    const mo = new Date(r.date + 'T00:00:00').getMonth();
    monthDist[mo] += parseFloat(r.distance_km) || 0;
  });
  const currentMonth = new Date().getMonth();
  const monthLabels = months.slice(0, currentMonth + 1);
  const monthData = monthDist.slice(0, currentMonth + 1);

  yearCard.innerHTML = `
    <div class="card-title">Distance ${thisYear}</div>
    <div class="year-progress">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.25rem">
        <span style="font-family:var(--font-mono);font-size:11px;color:var(--text-dim)">Progress to ${targetKm.toLocaleString()} km</span>
        <span style="font-family:var(--font-display);font-size:1.4rem;color:var(--accent)">${fmt(pct, 0)}%</span>
      </div>
      <div class="year-bar-track"><div class="year-bar-fill" style="width:${pct}%"></div></div>
      <div class="year-bar-labels"><span>${fmt(yearDist, 0)} km done</span><span>${fmt(targetKm - yearDist, 0)} km to go</span></div>
    </div>
    <div class="chart-wrap" style="margin-top:1.5rem;height:160px">
      <canvas id="monthChart"></canvas>
    </div>
  `;
  grid1.appendChild(yearCard);
  app.appendChild(grid1);

  // Monthly chart
  requestAnimationFrame(() => {
    new Chart($('monthChart'), {
      type: 'bar',
      data: {
        labels: monthLabels,
        datasets: [{
          data: monthData.map(v => parseFloat(v.toFixed(1))),
          backgroundColor: monthData.map((_, i) =>
            i === currentMonth ? 'rgba(232,255,90,0.85)' : 'rgba(232,255,90,0.2)'
          ),
          borderRadius: 2,
        }]
      },
      options: {
        ...chartOpts(),
        plugins: { ...chartOpts().plugins, tooltip: {
          ...chartOpts().plugins.tooltip,
          callbacks: { label: ctx => ` ${ctx.parsed.y} km` }
        }},
        scales: {
          x: { grid: { display: false }, ticks: { color: '#6b6b78' } },
          y: { grid: { color: '#1f1f24' }, ticks: { callback: v => `${v}km` } }
        }
      }
    });
  });

  // ── Weekly load + Pace & HR ───────────────────────────────────────────────
  const grid2 = document.createElement('div');
  grid2.className = 'grid-2';

  // Weekly training load (last 16 weeks)
  const weekMap = {};
  runs.forEach(r => {
    const wk = isoWeek(r.date);
    if (!weekMap[wk]) weekMap[wk] = { load: 0, dist: 0, count: 0 };
    weekMap[wk].load += parseFloat(r.training_load) || 0;
    weekMap[wk].dist += parseFloat(r.distance_km) || 0;
    weekMap[wk].count++;
  });

  const weekKeys = Object.keys(weekMap).sort().slice(-16);
  const weekLoads = weekKeys.map(k => parseFloat(weekMap[k].load.toFixed(0)));
  const weekLabels = weekKeys.map(k => k.split('-')[1]); // e.g. W24

  const loadCard = document.createElement('div');
  loadCard.className = 'card';
  loadCard.innerHTML = `
    <div class="card-title">Weekly training load — last 16 weeks</div>
    <div class="chart-wrap"><canvas id="loadChart"></canvas></div>
  `;
  grid2.appendChild(loadCard);

  // Pace & HR trend (last 20 outdoor runs)
  const outdoorRuns = runs.filter(r => r.type === 'outdoor' && r.avg_pace_min_km && r.avg_hr).slice(0, 20).reverse();
  const paceLabels = outdoorRuns.map(r => r.date.slice(5));
  const paceSecs = outdoorRuns.map(r => paceToSec(r.avg_pace_min_km));
  const hrData = outdoorRuns.map(r => parseFloat(r.avg_hr) || null);

  const paceCard = document.createElement('div');
  paceCard.className = 'card';
  paceCard.innerHTML = `
    <div class="card-title">Pace & heart rate trend — last 20 outdoor runs</div>
    <div class="chart-wrap"><canvas id="paceChart"></canvas></div>
  `;
  grid2.appendChild(paceCard);
  app.appendChild(grid2);

  requestAnimationFrame(() => {
    // Load chart
    new Chart($('loadChart'), {
      type: 'bar',
      data: {
        labels: weekLabels,
        datasets: [{
          data: weekLoads,
          backgroundColor: weekLoads.map((v, i) => {
            if (i === weekLoads.length - 1) return 'rgba(255,107,53,0.85)';
            const max = Math.max(...weekLoads);
            const intensity = max ? v / max : 0;
            return `rgba(232,255,90,${0.15 + intensity * 0.65})`;
          }),
          borderRadius: 2,
        }]
      },
      options: {
        ...chartOpts(),
        scales: {
          x: { grid: { display: false }, ticks: { color: '#6b6b78' } },
          y: { grid: { color: '#1f1f24' }, ticks: { color: '#6b6b78' } }
        },
        plugins: { ...chartOpts().plugins, tooltip: {
          ...chartOpts().plugins.tooltip,
          callbacks: { label: ctx => ` Load: ${ctx.parsed.y}` }
        }}
      }
    });

    // Pace + HR dual axis
    new Chart($('paceChart'), {
      type: 'line',
      data: {
        labels: paceLabels,
        datasets: [
          {
            label: 'Pace (s/km)',
            data: paceSecs,
            borderColor: 'rgba(232,255,90,0.8)',
            backgroundColor: 'rgba(232,255,90,0.06)',
            pointBackgroundColor: 'rgba(232,255,90,0.9)',
            pointRadius: 3,
            tension: 0.3,
            fill: true,
            yAxisID: 'yPace',
          },
          {
            label: 'Avg HR',
            data: hrData,
            borderColor: 'rgba(255,107,53,0.8)',
            backgroundColor: 'transparent',
            pointBackgroundColor: 'rgba(255,107,53,0.9)',
            pointRadius: 3,
            tension: 0.3,
            yAxisID: 'yHR',
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: {
            display: true,
            labels: { color: '#6b6b78', boxWidth: 10, font: { size: 10 } }
          },
          tooltip: {
            backgroundColor: '#141417',
            borderColor: '#1f1f24',
            borderWidth: 1,
            titleColor: '#eeeef4',
            bodyColor: '#c8c8d4',
            padding: 10,
            callbacks: {
              label: ctx => ctx.datasetIndex === 0
                ? ` Pace: ${secToPace(ctx.parsed.y)} /km`
                : ` HR: ${ctx.parsed.y} bpm`
            }
          }
        },
        scales: {
          x: { grid: { display: false }, ticks: { color: '#6b6b78', maxTicksLimit: 8 } },
          yPace: {
            position: 'left',
            reverse: true,
            grid: { color: '#1f1f24' },
            ticks: { color: '#6b6b78', callback: v => secToPace(v) }
          },
          yHR: {
            position: 'right',
            grid: { display: false },
            ticks: { color: '#6b6b78', callback: v => `${v}bpm` }
          }
        }
      }
    });
  });

  // ── VO2 max trend ─────────────────────────────────────────────────────────
  const vo2Runs = runs.filter(r => r.vo2max_estimate && parseFloat(r.vo2max_estimate) > 0).slice(0, 30).reverse();

  if (vo2Runs.length > 1) {
    const vo2Card = document.createElement('div');
    vo2Card.className = 'card';
    vo2Card.innerHTML = `
      <div class="card-title">VO₂ max estimate over time</div>
      <div class="chart-wrap"><canvas id="vo2Chart"></canvas></div>
    `;
    app.appendChild(vo2Card);

    requestAnimationFrame(() => {
      new Chart($('vo2Chart'), {
        type: 'line',
        data: {
          labels: vo2Runs.map(r => r.date.slice(5)),
          datasets: [{
            data: vo2Runs.map(r => parseFloat(r.vo2max_estimate)),
            borderColor: 'rgba(74,158,255,0.8)',
            backgroundColor: 'rgba(74,158,255,0.06)',
            pointBackgroundColor: 'rgba(74,158,255,0.9)',
            pointRadius: 3,
            tension: 0.4,
            fill: true,
          }]
        },
        options: {
          ...chartOpts(),
          scales: {
            x: { grid: { display: false }, ticks: { color: '#6b6b78' } },
            y: {
              grid: { color: '#1f1f24' },
              ticks: { color: '#6b6b78' },
              title: { display: true, text: 'mL/kg/min', color: '#3a3a42' }
            }
          },
          plugins: { ...chartOpts().plugins, tooltip: {
            ...chartOpts().plugins.tooltip,
            callbacks: { label: ctx => ` VO₂ max: ${ctx.parsed.y}` }
          }}
        }
      });
    });
  }
}

init().catch(err => {
  document.getElementById('app').innerHTML = `
    <div class="loading">Failed to load run data.<br><small>${err.message}</small></div>
  `;
});
</script>
</body>
</html>
