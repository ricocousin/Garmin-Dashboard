<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fred's Feats</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root {
      --bg:        #0d0d0f;
      --surface:   #141417;
      --border:    #1f1f24;
      --muted:     #3a3a42;
      --text-dim:  #6b6b78;
      --text:      #c8c8d4;
      --text-hi:   #eeeef4;
      --accent:    #e8ff5a;
      --accent2:   #ff6b35;
      --strength:  #4a9eff;
      --font-display: 'Syne', sans-serif;
      --font-body:    'Inter', sans-serif;
      --font-mono:    'DM Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 14px; line-height: 1.6; min-height: 100vh; }
    header { border-bottom: 1px solid var(--border); padding: 2rem 2rem 1.5rem; display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
    .logo { font-family: var(--font-display); font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 800; color: var(--text-hi); letter-spacing: -0.03em; line-height: 1; }
    .logo span { color: var(--accent); }
    .last-updated { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; }
    main { max-width: 1400px; margin: 0 auto; padding: 2rem; display: grid; gap: 1.5rem; }

    .overview { display: grid; grid-template-columns: 1fr 1px 1fr; border: 1px solid var(--border); background: var(--border); }
    .overview-half { background: var(--border); display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 1px; }
    .overview-divider { background: var(--border); width: 1px; }
    .overview-label { grid-column: 1 / -1; background: var(--surface); font-family: var(--font-mono); font-size: 9px; text-transform: uppercase; letter-spacing: 0.12em; padding: 0.5rem 1.5rem; color: var(--text-dim); border-bottom: 1px solid var(--border); }
    .overview-label.run { color: var(--accent); }
    .overview-label.lift { color: var(--strength); }
    @media (max-width: 800px) { .overview { grid-template-columns: 1fr; } .overview-divider { display: none; } }

    .time-card { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1px; background: var(--border); border: 1px solid var(--border); }
    .time-stat { background: var(--surface); padding: 1rem 1.25rem; display: flex; flex-direction: column; gap: 0.2rem; }

    .stat { background: var(--surface); padding: 1rem 1.5rem; display: flex; flex-direction: column; gap: 0.2rem; }
    .stat-label { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-dim); }
    .stat-value { font-family: var(--font-display); font-size: clamp(1.3rem, 2.5vw, 1.9rem); font-weight: 700; color: var(--text-hi); line-height: 1; }
    .stat-value.accent { color: var(--accent); }
    .stat-value.blue { color: var(--strength); }
    .stat-value.orange { color: var(--accent2); }
    .stat-sub { font-size: 11px; color: var(--text-dim); font-family: var(--font-mono); }

    .section-heading { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-dim); display: flex; align-items: center; gap: 0.75rem; margin-top: 0.25rem; }
    .section-heading::before { content: ''; width: 3px; height: 12px; background: var(--accent); border-radius: 2px; }
    .section-heading.lift::before { background: var(--strength); }
    .section-heading.total::before { background: var(--accent2); }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    @media (max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } }

    .card { background: var(--surface); border: 1px solid var(--border); padding: 1.5rem; }
    .card-title { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-dim); margin-bottom: 1.25rem; display: flex; align-items: center; gap: 0.5rem; }
    .card-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .efforts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 1px; background: var(--border); }
    .effort { background: var(--surface); padding: 1rem 1.25rem; }
    .effort-label { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); margin-bottom: 0.3rem; }
    .effort-value { font-family: var(--font-display); font-size: 1.3rem; font-weight: 700; color: var(--accent); line-height: 1; }
    .effort-detail { font-family: var(--font-mono); font-size: 10px; color: var(--text); margin-top: 0.25rem; }
    .effort-sub { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); margin-top: 0.1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .effort-date { font-family: var(--font-mono); font-size: 10px; color: var(--muted); margin-top: 0.1rem; }

    .lt-grid { display: grid; grid-template-columns: auto 1fr; gap: 1.5rem; align-items: start; }
    .lt-values { display: flex; flex-direction: column; gap: 0.75rem; }
    .lt-main { display: flex; flex-direction: column; gap: 0.1rem; }
    .lt-pace { font-family: var(--font-display); font-size: 2.5rem; font-weight: 800; color: var(--accent); line-height: 1; }
    .lt-hr { font-family: var(--font-mono); font-size: 13px; color: var(--accent2); }
    .lt-label { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-dim); }

    .zones { display: flex; flex-direction: column; gap: 0.4rem; margin-top: 0.5rem; }
    .zone { display: grid; grid-template-columns: 75px 1fr auto; align-items: center; gap: 0.75rem; font-family: var(--font-mono); font-size: 11px; }
    .zone-name { color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; }
    .zone-bar-track { height: 4px; background: var(--muted); border-radius: 2px; overflow: hidden; }
    .zone-bar-fill { height: 100%; border-radius: 2px; }
    .zone-pace { color: var(--text); white-space: nowrap; }

    .runs-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .runs-table th { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); text-align: left; padding: 0 0.75rem 0.75rem 0; border-bottom: 1px solid var(--border); white-space: nowrap; }
    .runs-table td { padding: 0.55rem 0.75rem 0.55rem 0; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: middle; }
    .runs-table tr:last-child td { border-bottom: none; }
    .runs-table tr:hover td { color: var(--text-hi); }
    .mono { font-family: var(--font-mono); }

    .chart-wrap { position: relative; height: 220px; }
    .year-bar-track { height: 6px; background: var(--muted); border-radius: 3px; overflow: hidden; margin: 0.5rem 0; }
    .year-bar-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 1s ease; }
    .year-bar-fill.overflow { background: var(--accent2); }
    .year-bar-labels { display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); }

    .loading { text-align: center; padding: 4rem 2rem; font-family: var(--font-mono); color: var(--text-dim); font-size: 12px; letter-spacing: 0.1em; }
    .pulse { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 1.2s ease-in-out infinite; margin-right: 0.5rem; vertical-align: middle; }
    @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(0.6); } }
  </style>
</head>
<body>

<header>
  <div class="logo">FRED'S <span>FEATS</span></div>
  <div class="last-updated" id="last-updated">Loading…</div>
</header>

<main id="app">
  <div class="loading"><span class="pulse"></span>Fetching activity data…</div>
</main>

<script>
const $ = id => document.getElementById(id);

function fmt(n, dec = 1) {
  if (n === null || n === undefined || n === '') return '—';
  return Number(n).toFixed(dec);
}

function isoWeek(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const jan4 = new Date(d.getFullYear(), 0, 4);
  const week = Math.ceil(((d - jan4) / 86400000 + jan4.getDay() + 1) / 7);
  return `${d.getFullYear()}-W${String(week).padStart(2,'0')}`;
}

function weekStartDate(isoWk) {
  const [y, w] = isoWk.split('-W').map(Number);
  const jan4 = new Date(y, 0, 4);
  const dayOfWeek = jan4.getDay() || 7;
  const week1Mon = new Date(jan4);
  week1Mon.setDate(jan4.getDate() - dayOfWeek + 1);
  const result = new Date(week1Mon);
  result.setDate(week1Mon.getDate() + (w - 1) * 7);
  return result;
}

function paceToSec(p) {
  if (!p) return null;
  const [m, s] = p.split(':').map(Number);
  return m * 60 + (s || 0);
}

function secToPace(s) {
  if (!s || s <= 0 || !isFinite(s)) return '—';
  return `${Math.floor(s/60)}:${String(Math.round(s%60)).padStart(2,'0')}`;
}

function fmtHrs(mins) {
  if (!mins || mins <= 0) return '—';
  const h = Math.floor(mins / 60);
  const m = Math.round(mins % 60);
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
}

function fmtDuration(timeStr) {
  if (!timeStr) return '—';
  const parts = timeStr.split(':').map(Number);
  if (parts.length === 3) {
    const [h, m, s] = parts;
    if (h > 0) return `${h}h ${m}m`;
    return `${m}m ${s}s`;
  }
  return timeStr;
}

// Simple linear regression for trend lines
function linearTrend(values) {
  const n = values.length;
  if (n < 2) return values.map(() => null);
  const xs = values.map((_, i) => i);
  const validPairs = xs.map((x, i) => [x, values[i]]).filter(([,v]) => v !== null && v !== undefined && !isNaN(v));
  if (validPairs.length < 2) return values.map(() => null);
  const xMean = validPairs.reduce((s, [x]) => s + x, 0) / validPairs.length;
  const yMean = validPairs.reduce((s, [,y]) => s + y, 0) / validPairs.length;
  let num = 0, den = 0;
  validPairs.forEach(([x, y]) => { num += (x - xMean) * (y - yMean); den += (x - xMean) ** 2; });
  const slope = den !== 0 ? num / den : 0;
  const intercept = yMean - slope * xMean;
  return xs.map(x => slope * x + intercept);
}

Chart.defaults.color = '#6b6b78';
Chart.defaults.borderColor = '#1f1f24';
Chart.defaults.font.family = "'DM Mono', monospace";
Chart.defaults.font.size = 10;

function chartOpts(extra = {}) {
  return {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false }, tooltip: {
      backgroundColor: '#141417', borderColor: '#1f1f24', borderWidth: 1,
      titleColor: '#eeeef4', bodyColor: '#c8c8d4', padding: 10,
    }},
    scales: {
      x: { grid: { color: '#1f1f24' }, ticks: { maxRotation: 0 } },
      y: { grid: { color: '#1f1f24' } }
    },
    ...extra
  };
}

// ── Best efforts (minimum-distance floor, not strict band) ────────────────────
function calcBestEfforts(runs) {
  const cats = [
    { label: '5 km',     min: 4 },
    { label: '10 km',    min: 8 },
    { label: 'Half',     min: 18 },
    { label: 'Marathon', min: 38 },
    { label: '50 km',    min: 45 },
  ];

  const results = cats.map(cat => {
    const eligible = runs.filter(r => parseFloat(r.distance_km) >= cat.min && r.avg_pace_min_km);
    if (!eligible.length) return { label: cat.label, pace: '—', time: '—', dist: '—', date: null, name: 'no data yet' };
    const best = eligible.reduce((a, b) =>
      paceToSec(a.avg_pace_min_km) < paceToSec(b.avg_pace_min_km) ? a : b);
    return {
      label: cat.label,
      pace: best.avg_pace_min_km + ' /km',
      time: fmtDuration(best.moving_time),
      dist: fmt(best.distance_km, 1) + ' km',
      date: best.date,
      name: best.name || ''
    };
  });

  const longest = runs.reduce((a, b) =>
    (parseFloat(a.distance_km) || 0) > (parseFloat(b.distance_km) || 0) ? a : b, runs[0]);
  results.push({
    label: 'Longest', pace: '—', time: fmtDuration(longest?.moving_time),
    dist: fmt(longest?.distance_km, 1) + ' km', date: longest?.date, name: longest?.name || ''
  });

  return results;
}

// ── Training zones from LT pace ───────────────────────────────────────────────
function calcZones(ltPaceStr, ltHr) {
  const ltSec = paceToSec(ltPaceStr);
  if (!ltSec) return null;
  const z1HrMax = ltHr ? Math.round(ltHr * 0.80) : null;
  const z2HrMax = ltHr ? Math.round(ltHr * 0.90) : null;
  const z3HrMax = ltHr ? Math.round(ltHr * 0.99) : null;
  const z4HrMax = ltHr ? Math.round(ltHr * 1.05) : null;
  return [
    { name: 'Z1 Easy',      pace: `> ${secToPace(ltSec + 75)}`,                          hr: ltHr ? `< ${z1HrMax} bpm` : '', color: '#4a9eff', pct: 40 },
    { name: 'Z2 Aerobic',   pace: `${secToPace(ltSec + 45)}–${secToPace(ltSec + 74)}`,    hr: ltHr ? `${z1HrMax}–${z2HrMax} bpm` : '', color: '#7bc67e', pct: 60 },
    { name: 'Z3 Tempo',     pace: `${secToPace(ltSec + 10)}–${secToPace(ltSec + 44)}`,    hr: ltHr ? `${z2HrMax}–${z3HrMax} bpm` : '', color: '#e8ff5a', pct: 78 },
    { name: 'Z4 Threshold', pace: `${secToPace(ltSec - 10)}–${secToPace(ltSec + 9)}`,     hr: ltHr ? `${z3HrMax}–${z4HrMax} bpm` : '', color: '#ff9f40', pct: 90 },
    { name: 'Z5 Hard',      pace: `< ${secToPace(ltSec - 11)}`,                            hr: ltHr ? `> ${z4HrMax} bpm` : '', color: '#ff6b35', pct: 100 },
  ];
}

// ── Main ──────────────────────────────────────────────────────────────────────
async function init() {
  const [runsRaw, strengthRaw, summary, ltDataRaw] = await Promise.all([
    fetch('runs.csv').then(r => r.text()),
    fetch('strength.csv').then(r => r.text()).catch(() => null),
    fetch('summary.json').then(r => r.json()).catch(() => null),
    fetch('lactate.json').then(r => r.json()).catch(() => [])
  ]);

  const { data: runRows } = Papa.parse(runsRaw, { header: true, skipEmptyLines: true });
  const runs = runRows.filter(r => r.date);

  let sessions = [];
  if (strengthRaw) {
    const { data: sRows } = Papa.parse(strengthRaw, { header: true, skipEmptyLines: true });
    sessions = sRows.filter(r => r.date);
  }

  // Filter out implausible LT values (e.g. bad unit conversions producing >20:00/km)
  const ltData = (ltDataRaw || []).filter(r => {
    const sec = paceToSec(r.lt_pace);
    return sec && sec > 120 && sec < 900; // between 2:00 and 15:00 /km
  });

  if (summary) $('last-updated').textContent = `Updated ${summary.last_updated}`;

  const app = $('app');
  app.innerHTML = '';

  const today = new Date();
  const thisYear = today.getFullYear().toString();
  const thisMonth = today.toLocaleString('en', { month: 'short' });

  const yearRuns = runs.filter(r => r.date.startsWith(thisYear));
  const yearDist = yearRuns.reduce((s, r) => s + (parseFloat(r.distance_km) || 0), 0);
  const yearSessions = sessions.filter(s => s.date.startsWith(thisYear));
  const totalStrengthMinYear = yearSessions.reduce((s, r) => s + (parseFloat(r.duration_min) || 0), 0);

  const runWeeksYear = new Set(yearRuns.map(r => isoWeek(r.date)));
  const sWeeksYear = new Set(yearSessions.map(s => isoWeek(s.date)));
  const numRunWeeks = Math.max(runWeeksYear.size, 1);
  const numSWeeks = Math.max(sWeeksYear.size, 1);

  const avgRunDistPerWeek = yearDist / numRunWeeks;
  const avgRunDistPerRun = yearDist / Math.max(yearRuns.length, 1);
  const avgSessPerWeek = yearSessions.length / numRunWeeks;

  const monthRuns = yearRuns.filter(r =>
    new Date(r.date + 'T00:00:00').toLocaleString('en', { month: 'short' }) === thisMonth);
  const monthSessions = yearSessions.filter(s =>
    new Date(s.date + 'T00:00:00').toLocaleString('en', { month: 'short' }) === thisMonth);

  const totalRunMinsYear = yearRuns.reduce((s, r) => {
    const parts = (r.moving_time || '').split(':').map(Number);
    return s + (parts[0] * 60 + (parts[1] || 0) + (parts[2] || 0) / 60);
  }, 0);

  const monthRunMins = monthRuns.reduce((s, r) => {
    const parts = (r.moving_time || '').split(':').map(Number);
    return s + (parts[0] * 60 + (parts[1] || 0) + (parts[2] || 0) / 60);
  }, 0);
  const monthStrengthMins = monthSessions.reduce((s, r) => s + (parseFloat(r.duration_min) || 0), 0);
  const weeksInMonth = Math.max(new Set(monthRuns.map(r => isoWeek(r.date))).size, 1);

  const totalActivityMinsYear = totalRunMinsYear + totalStrengthMinYear;
  const avgActivityMinsPerWeek = totalActivityMinsYear / numRunWeeks;
  const avgActivityMinsPerWeekMonth = (monthRunMins + monthStrengthMins) / weeksInMonth;

  const latestLT = ltData.length > 0 ? ltData[ltData.length - 1] : null;
  const zones = latestLT ? calcZones(latestLT.lt_pace, latestLT.lt_hr) : null;

  // ── Combined overview ────────────────────────────────────────────────────────
  const overview = document.createElement('div');
  overview.className = 'overview';
  overview.innerHTML = `
    <div class="overview-half">
      <div class="overview-label run">Running</div>
      <div class="stat">
        <span class="stat-label">Runs ${thisYear}</span>
        <span class="stat-value accent">${summary?.total_runs_this_year ?? yearRuns.length}</span>
        <span class="stat-sub">${fmt(avgRunDistPerRun, 1)} km avg / run</span>
      </div>
      <div class="stat">
        <span class="stat-label">Distance ${thisYear}</span>
        <span class="stat-value">${fmt(summary?.total_distance_this_year_km ?? yearDist, 0)} <small style="font-size:.9rem;color:var(--text-dim)">km</small></span>
        <span class="stat-sub">${fmt(avgRunDistPerWeek, 1)} km / week avg</span>
      </div>
      <div class="stat">
        <span class="stat-label">Weekly streak</span>
        <span class="stat-value accent">${summary?.current_weekly_streak ?? '—'} <small style="font-size:.9rem;color:var(--text-dim)">wks</small></span>
        <span class="stat-sub">Best: ${summary?.longest_weekly_streak ?? '—'} wks</span>
      </div>
      <div class="stat">
        <span class="stat-label">Last run</span>
        <span class="stat-value" style="font-size:1.2rem">${runs[0]?.date ?? '—'}</span>
        <span class="stat-sub">${fmt(runs[0]?.distance_km)} km · ${runs[0]?.avg_pace_min_km ?? '—'} /km</span>
      </div>
    </div>
    <div class="overview-divider"></div>
    <div class="overview-half">
      <div class="overview-label lift">Strength</div>
      <div class="stat">
        <span class="stat-label">Sessions ${thisYear}</span>
        <span class="stat-value blue">${summary?.total_strength_this_year ?? yearSessions.length}</span>
        <span class="stat-sub">${fmt(avgSessPerWeek, 1)} / week avg</span>
      </div>
      <div class="stat">
        <span class="stat-label">Hours ${thisYear}</span>
        <span class="stat-value">${(totalStrengthMinYear / 60).toFixed(1)} <small style="font-size:.9rem;color:var(--text-dim)">hrs</small></span>
        <span class="stat-sub">${fmt(avgSessPerWeek * 4.3, 1)} / month avg</span>
      </div>
      <div class="stat">
        <span class="stat-label">Weekly streak</span>
        <span class="stat-value blue">${summary?.current_strength_weekly_streak ?? '—'} <small style="font-size:.9rem;color:var(--text-dim)">wks</small></span>
        <span class="stat-sub">Best: ${summary?.longest_strength_weekly_streak ?? '—'} wks</span>
      </div>
      <div class="stat">
        <span class="stat-label">Last session</span>
        <span class="stat-value" style="font-size:1.2rem">${sessions[0]?.date ?? '—'}</span>
        <span class="stat-sub">${sessions[0]?.elapsed_time ?? '—'}</span>
      </div>
    </div>
  `;
  app.appendChild(overview);

  // ── Intensity Minutes card ───────────────────────────────────────────────────
  const timeHeading = document.createElement('div');
  timeHeading.className = 'section-heading total';
  timeHeading.textContent = 'Intensity Minutes';
  app.appendChild(timeHeading);

  const timeCard = document.createElement('div');
  timeCard.className = 'time-card';
  timeCard.innerHTML = `
    <div class="time-stat">
      <span class="stat-label">Total ${thisYear}</span>
      <span class="stat-value orange" style="font-family:var(--font-display);font-size:1.8rem;font-weight:700;line-height:1">${fmtHrs(totalActivityMinsYear)}</span>
      <span class="stat-sub">running + strength combined</span>
    </div>
    <div class="time-stat">
      <span class="stat-label">Avg / week (${thisYear})</span>
      <span class="stat-value" style="font-family:var(--font-display);font-size:1.8rem;font-weight:700;line-height:1">${fmtHrs(avgActivityMinsPerWeek)}</span>
      <span class="stat-sub">${fmtHrs(totalRunMinsYear / numRunWeeks)} run · ${fmtHrs(totalStrengthMinYear / numSWeeks)} lift</span>
    </div>
    <div class="time-stat">
      <span class="stat-label">Avg / week (${thisMonth})</span>
      <span class="stat-value" style="font-family:var(--font-display);font-size:1.8rem;font-weight:700;line-height:1">${fmtHrs(avgActivityMinsPerWeekMonth)}</span>
      <span class="stat-sub">${fmtHrs(monthRunMins / weeksInMonth)} run · ${fmtHrs(monthStrengthMins / weeksInMonth)} lift</span>
    </div>
  `;
  app.appendChild(timeCard);

  // ── Running section ──────────────────────────────────────────────────────────
  const runHeading = document.createElement('div');
  runHeading.className = 'section-heading';
  runHeading.textContent = 'Running';
  app.appendChild(runHeading);

  const efforts = calcBestEfforts(runs.filter(r => r.type === 'outdoor'));
  const effortsCard = document.createElement('div');
  effortsCard.className = 'card';
  effortsCard.innerHTML = `
    <div class="card-title">Personal bests — by distance category</div>
    <div class="efforts-grid">
      ${efforts.map(e => `
        <div class="effort">
          <div class="effort-label">${e.label}</div>
          <div class="effort-value">${e.pace}</div>
          <div class="effort-detail">${e.time} · ${e.dist}</div>
          <div class="effort-sub">${e.name}</div>
          <div class="effort-date">${e.date ?? ''}</div>
        </div>
      `).join('')}
    </div>
  `;
  app.appendChild(effortsCard);

  const ltCard = document.createElement('div');
  ltCard.className = 'card';

  if (latestLT) {
    const zonesHtml = zones ? zones.map(z => `
      <div class="zone">
        <span class="zone-name">${z.name}</span>
        <div class="zone-bar-track"><div class="zone-bar-fill" style="width:${z.pct}%;background:${z.color}"></div></div>
        <span class="zone-pace">${z.pace}${z.hr ? ' · ' + z.hr : ''}</span>
      </div>
    `).join('') : '';

    const ltTrendHtml = ltData.length > 1
      ? `<div class="chart-wrap" style="height:100px;margin-top:1rem"><canvas id="ltChart"></canvas></div>`
      : `<p style="font-family:var(--font-mono);font-size:11px;color:var(--text-dim);margin-top:1rem">Trend builds daily — check back soon.</p>`;

    ltCard.innerHTML = `
      <div class="card-title">Lactate threshold</div>
      <div class="lt-grid">
        <div class="lt-values">
          <div class="lt-main">
            <span class="lt-label">LT pace</span>
            <span class="lt-pace">${latestLT.lt_pace} /km</span>
            <span class="lt-hr">@ ${latestLT.lt_hr} bpm · ${latestLT.lt_source_date ?? latestLT.date}</span>
          </div>
        </div>
        <div>
          <div class="lt-label" style="margin-bottom:0.75rem">Training zones</div>
          <div class="zones">${zonesHtml}</div>
        </div>
      </div>
      ${ltTrendHtml}
    `;
  } else {
    ltCard.innerHTML = `
      <div class="card-title">Lactate threshold</div>
      <p style="font-family:var(--font-mono);font-size:11px;color:var(--text-dim)">
        No valid LT reading yet — recalibrating after a data fix. Should appear after tomorrow's sync.
      </p>
    `;
  }
  app.appendChild(ltCard);

  // Distance progress (overflow-capable) + weekly distance
  const prevYearDist = summary?.total_distance_prev_year_km ?? null;
  const targetKm = prevYearDist && prevYearDist > 0 ? prevYearDist : 2000;
  const targetLabel = prevYearDist && prevYearDist > 0
    ? `vs ${today.getFullYear() - 1} total (${fmt(targetKm, 0)} km)`
    : 'Progress to 2,000 km';
  const rawPct = (yearDist / targetKm) * 100;
  const displayPct = Math.min(rawPct, 130); // cap visual bar growth but show real %
  const isOverflow = yearDist > targetKm;

  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const monthDist = Array(12).fill(0);
  yearRuns.forEach(r => {
    const mo = new Date(r.date + 'T00:00:00').getMonth();
    monthDist[mo] += parseFloat(r.distance_km) || 0;
  });
  const currentMonth = today.getMonth();
  const monthLabels = months.slice(0, currentMonth + 1);
  const monthData = monthDist.slice(0, currentMonth + 1);

  // Weekly distance (replacing training load) with month-boundary markers
  const weekMap = {};
  runs.forEach(r => {
    const wk = isoWeek(r.date);
    if (!weekMap[wk]) weekMap[wk] = { dist: 0 };
    weekMap[wk].dist += parseFloat(r.distance_km) || 0;
  });
  const weekKeys = Object.keys(weekMap).sort().slice(-16);
  const weekDistances = weekKeys.map(k => parseFloat(weekMap[k].dist.toFixed(1)));
  const weekLabelsRun = weekKeys.map(k => k.split('-')[1]);
  const weekMonthBoundary = weekKeys.map((k, i) => {
    if (i === 0) return false;
    const curMonth = weekStartDate(k).getMonth();
    const prevMonth = weekStartDate(weekKeys[i - 1]).getMonth();
    return curMonth !== prevMonth;
  });

  const grid1 = document.createElement('div');
  grid1.className = 'grid-2';

  const yearCard = document.createElement('div');
  yearCard.className = 'card';
  yearCard.innerHTML = `
    <div class="card-title">Distance ${thisYear}</div>
    <div>
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.25rem">
        <span style="font-family:var(--font-mono);font-size:11px;color:var(--text-dim)">${targetLabel}</span>
        <span style="font-family:var(--font-display);font-size:1.4rem;color:${isOverflow ? 'var(--accent2)' : 'var(--accent)'}">${fmt(rawPct, 0)}%</span>
      </div>
      <div class="year-bar-track"><div class="year-bar-fill${isOverflow ? ' overflow' : ''}" style="width:${displayPct}%"></div></div>
      <div class="year-bar-labels"><span>${fmt(yearDist, 0)} km done</span><span>${isOverflow ? '+' + fmt(yearDist - targetKm, 0) + ' km ahead' : fmt(targetKm - yearDist, 0) + ' km to go'}</span></div>
    </div>
    <div class="chart-wrap" style="margin-top:1.5rem;height:155px"><canvas id="monthChart"></canvas></div>
  `;
  grid1.appendChild(yearCard);

  const distCard = document.createElement('div');
  distCard.className = 'card';
  distCard.innerHTML = `
    <div class="card-title">Weekly distance — last 16 weeks</div>
    <div class="chart-wrap"><canvas id="weeklyDistChart"></canvas></div>
  `;
  grid1.appendChild(distCard);
  app.appendChild(grid1);

  // ── Strength section ─────────────────────────────────────────────────────────
  const liftHeading = document.createElement('div');
  liftHeading.className = 'section-heading lift';
  liftHeading.textContent = 'Strength Training';
  app.appendChild(liftHeading);

  const sWeekMap = {};
  sessions.forEach(s => {
    const wk = isoWeek(s.date);
    if (!sWeekMap[wk]) sWeekMap[wk] = { count: 0 };
    sWeekMap[wk].count++;
  });
  const sWeekKeys = Object.keys(sWeekMap).sort().slice(-16);
  const sWeekCounts = sWeekKeys.map(k => sWeekMap[k].count);
  const sWeekLabels = sWeekKeys.map(k => k.split('-')[1]);

  const sCountCard = document.createElement('div');
  sCountCard.className = 'card';
  sCountCard.innerHTML = `
    <div class="card-title">Weekly sessions — last 16 weeks</div>
    <div class="chart-wrap"><canvas id="strengthCountChart"></canvas></div>
  `;
  app.appendChild(sCountCard);

  const monthlyMap = {};
  yearSessions.forEach(s => {
    const mo = new Date(s.date + 'T00:00:00').toLocaleString('en', { month: 'short' });
    if (!monthlyMap[mo]) monthlyMap[mo] = { count: 0, mins: 0 };
    monthlyMap[mo].count++;
    monthlyMap[mo].mins += parseFloat(s.duration_min) || 0;
  });

  const monthlyCard = document.createElement('div');
  monthlyCard.className = 'card';
  monthlyCard.innerHTML = `
    <div class="card-title">Monthly summary ${thisYear}</div>
    <table class="runs-table">
      <thead><tr><th>Month</th><th>Sessions</th><th>Total time</th><th>Avg session</th></tr></thead>
      <tbody>
        ${Object.entries(monthlyMap).map(([mo, d]) => `
          <tr>
            <td class="mono" style="color:var(--text-dim)">${mo}</td>
            <td class="mono">${d.count}</td>
            <td class="mono">${Math.round(d.mins)} min</td>
            <td class="mono">${Math.round(d.mins / d.count)} min</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
  app.appendChild(monthlyCard);

  // ── Render charts ─────────────────────────────────────────────────────────────
  requestAnimationFrame(() => {
    const monthTrend = linearTrend(monthData);
    new Chart($('monthChart'), {
      type: 'bar',
      data: { labels: monthLabels, datasets: [
        { data: monthData.map(v => parseFloat(v.toFixed(1))),
          backgroundColor: monthData.map((_, i) => i === currentMonth ? 'rgba(232,255,90,0.85)' : 'rgba(232,255,90,0.2)'),
          borderRadius: 2, order: 2 },
        { type: 'line', data: monthTrend, borderColor: 'rgba(255,107,53,0.7)', borderWidth: 1.5,
          borderDash: [4,3], pointRadius: 0, fill: false, tension: 0, order: 1 }
      ] },
      options: { ...chartOpts(), scales: {
        x: { grid: { display: false }, ticks: { color: '#6b6b78' } },
        y: { grid: { color: '#1f1f24' }, ticks: { callback: v => `${v}km` } }
      }, plugins: { ...chartOpts().plugins, tooltip: { ...chartOpts().plugins.tooltip,
        callbacks: { label: ctx => ctx.datasetIndex === 0 ? ` ${ctx.parsed.y} km` : ` Trend` } }} }
    });

    const distTrend = linearTrend(weekDistances);
    new Chart($('weeklyDistChart'), {
      type: 'bar',
      data: { labels: weekLabelsRun, datasets: [
        { data: weekDistances,
          backgroundColor: weekDistances.map((v, i) => {
            if (i === weekDistances.length - 1) return 'rgba(255,107,53,0.85)';
            const max = Math.max(...weekDistances);
            return `rgba(232,255,90,${0.15 + (max ? v/max : 0) * 0.65})`;
          }), borderRadius: 2, order: 2 },
        { type: 'line', data: distTrend, borderColor: 'rgba(255,107,53,0.7)', borderWidth: 1.5,
          borderDash: [4,3], pointRadius: 0, fill: false, tension: 0, order: 1 }
      ] },
      options: { ...chartOpts(), scales: {
        x: { grid: { display: false }, ticks: { color: '#6b6b78' } },
        y: { grid: { color: '#1f1f24' }, ticks: { color: '#6b6b78', callback: v => `${v}km` } }
      }, plugins: { ...chartOpts().plugins, tooltip: { ...chartOpts().plugins.tooltip,
        callbacks: { label: ctx => ctx.datasetIndex === 0 ? ` ${ctx.parsed.y} km` : ` Trend` } } },
      } 
    });

    // Month boundary lines via afterDraw plugin
    const monthLinePlugin = {
      id: 'monthLines',
      afterDraw(chart) {
        const { ctx, chartArea, scales } = chart;
        ctx.save();
        ctx.strokeStyle = 'rgba(255,255,255,0.15)';
        ctx.setLineDash([3,3]);
        weekMonthBoundary.forEach((isBoundary, i) => {
          if (isBoundary) {
            const x = scales.x.getPixelForValue(i) - (scales.x.getPixelForValue(1) - scales.x.getPixelForValue(0)) / 2;
            ctx.beginPath();
            ctx.moveTo(x, chartArea.top);
            ctx.lineTo(x, chartArea.bottom);
            ctx.stroke();
          }
        });
        ctx.restore();
      }
    };
    Chart.register(monthLinePlugin);

    if ($('ltChart') && ltData.length > 1) {
      const ltSorted = [...ltData].sort((a, b) => a.date.localeCompare(b.date));
      const ltSecs = ltSorted.map(r => paceToSec(r.lt_pace));
      const ltTrend = linearTrend(ltSecs);
      new Chart($('ltChart'), {
        type: 'line',
        data: { labels: ltSorted.map(r => r.date.slice(5)), datasets: [
          { data: ltSecs, borderColor: 'rgba(232,255,90,0.8)', backgroundColor: 'rgba(232,255,90,0.06)',
            pointBackgroundColor: 'rgba(232,255,90,0.9)', pointRadius: 4, tension: 0.3, fill: true },
          { data: ltTrend, borderColor: 'rgba(255,107,53,0.7)', borderWidth: 1.5, borderDash: [4,3],
            pointRadius: 0, fill: false, tension: 0 }
        ] },
        options: { ...chartOpts(), scales: {
          x: { grid: { display: false }, ticks: { color: '#6b6b78' } },
          y: { reverse: true, grid: { color: '#1f1f24' }, ticks: { color: '#6b6b78', callback: v => secToPace(v) } }
        }, plugins: { ...chartOpts().plugins, tooltip: { ...chartOpts().plugins.tooltip,
          callbacks: { label: ctx => ctx.datasetIndex === 0 ? ` LT pace: ${secToPace(ctx.parsed.y)} /km` : ` Trend` } }} }
      });
    }

    new Chart($('strengthCountChart'), {
      type: 'bar',
      data: { labels: sWeekLabels, datasets: [{ data: sWeekCounts,
        backgroundColor: sWeekCounts.map((_, i) =>
          i === sWeekCounts.length - 1 ? 'rgba(255,107,53,0.85)' : 'rgba(74,158,255,0.25)'),
        borderRadius: 2 }] },
      options: { ...chartOpts(), scales: {
        x: { grid: { display: false }, ticks: { color: '#6b6b78' } },
        y: { grid: { color: '#1f1f24' }, ticks: { color: '#6b6b78', stepSize: 1 } }
      }, plugins: { ...chartOpts().plugins, tooltip: { ...chartOpts().plugins.tooltip,
        callbacks: { label: ctx => ` ${ctx.parsed.y} session${ctx.parsed.y !== 1 ? 's' : ''}` } }} }
    });
  });
}

init().catch(err => {
  document.getElementById('app').innerHTML =
    `<div class="loading">Failed to load data.<br><small>${err.message}</small></div>`;
});
</script>
</body>
</html>
