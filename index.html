<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fred's Feats</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root {
      --bg:        #0d0d0f;
      --surface:   #141417;
      --border:    #1f1f24;
      --muted:     #3a3a42;
      --text-dim:  #6b6b78;
      --text:      #c8c8d4;
      --text-hi:   #eeeef4;
      --accent:    #e8ff5a;
      --accent2:   #ff6b35;
      --strength:  #4a9eff;
      --font-display: 'Syne', sans-serif;
      --font-body:    'Inter', sans-serif;
      --font-mono:    'DM Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 2rem 2rem 1.5rem;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .logo {
      font-family: var(--font-display);
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      color: var(--text-hi);
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .logo span { color: var(--accent); }

    .last-updated {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
      display: grid;
      gap: 1.5rem;
    }

    /* ── Overview ── */
    .overview {
      display: grid;
      grid-template-columns: 1fr 1px 1fr;
      border: 1px solid var(--border);
      background: var(--border);
    }

    .overview-half {
      background: var(--border);
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 1px;
    }

    .overview-divider { background: var(--border); width: 1px; }

    .overview-label {
      grid-column: 1 / -1;
      background: var(--surface);
      font-family: var(--font-mono);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      padding: 0.5rem 1.5rem;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
    }

    .overview-label.run { color: var(--accent); }
    .overview-label.lift { color: var(--strength); }

    @media (max-width: 800px) {
      .overview { grid-template-columns: 1fr; }
      .overview-divider { display: none; }
    }

    /* ── Combined time card ── */
    .time-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1.25rem 1.5rem;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1px;
      background: var(--border);
    }

    .time-stat {
      background: var(--surface);
      padding: 1rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    /* ── Stats ── */
    .stat {
      background: var(--surface);
      padding: 1rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .stat-label {
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
    }

    .stat-value {
      font-family: var(--font-display);
      font-size: clamp(1.3rem, 2.5vw, 1.9rem);
      font-weight: 700;
      color: var(--text-hi);
      line-height: 1;
    }

    .stat-value.accent { color: var(--accent); }
    .stat-value.blue { color: var(--strength); }
    .stat-value.orange { color: var(--accent2); }

    .stat-sub {
      font-size: 11px;
      color: var(--text-dim);
      font-family: var(--font-mono);
    }

    /* ── Section heading ── */
    .section-heading {
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-top: 0.25rem;
    }

    .section-heading::before {
      content: '';
      width: 3px;
      height: 12px;
      background: var(--accent);
      border-radius: 2px;
    }

    .section-heading.lift::before { background: var(--strength); }

    /* ── Grid ── */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    @media (max-width: 900px) {
      .grid-2 { grid-template-columns: 1fr; }
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1.5rem;
    }

    .card-title {
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .card-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Best efforts ── */
    .efforts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 1px;
      background: var(--border);
    }

    .effort {
      background: var(--surface);
      padding: 1rem 1.25rem;
    }

    .effort-label {
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      margin-bottom: 0.3rem;
    }

    .effort-value {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
    }

    .effort-sub {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 0.25rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .effort-date {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted);
      margin-top: 0.1rem;
    }

    /* ── Tables ── */
    .runs-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .runs-table th {
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      text-align: left;
      padding: 0 0.75rem 0.75rem 0;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    .runs-table td {
      padding: 0.55rem 0.75rem 0.55rem 0;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      vertical-align: middle;
    }

    .runs-table tr:last-child td { border-bottom: none; }
    .runs-table tr:hover td { color: var(--text-hi); }
    .mono { font-family: var(--font-mono); }

    /* ── Charts ── */
    .chart-wrap { position: relative; height: 220px; }

    /* ── Year bar ── */
    .year-bar-track {
      height: 6px; background: var(--muted);
      border-radius: 3px; overflow: hidden; margin: 0.5rem 0;
    }
    .year-bar-fill {
      height: 100%; background: var(--accent);
      border-radius: 3px; transition: width 1s ease;
    }
    .year-bar-labels {
      display: flex; justify-content: space-between;
      font-family: var(--font-mono); font-size: 10px; color: var(--text-dim);
    }

    /* ── Loading ── */
    .loading {
      text-align: center; padding: 4rem 2rem;
      font-family: var(--font-mono); color: var(--text-dim);
      font-size: 12px; letter-spacing: 0.1em;
    }

    .pulse {
      display: inline-block; width: 6px; height: 6px;
      border-radius: 50%; background: var(--accent);
      animation: pulse 1.2s ease-in-out infinite;
      margin-right: 0.5rem; vertical-align: middle;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.3; transform: scale(0.6); }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">FRED'S <span>FEATS</span></div>
  <div class="last-updated" id="last-updated">Loading…</div>
</header>

<main id="app">
  <div class="loading"><span class="pulse"></span>Fetching activity data…</div>
</main>

<script>
const $ = id => document.getElementById(id);

function fmt(n, dec = 1) {
  if (n === null || n === undefined || n === '') return '—';
  return Number(n).toFixed(dec);
}

function isoWeek(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const jan4 = new Date(d.getFullYear(), 0, 4);
  const week = Math.ceil(((d - jan4) / 86400000 + jan4.getDay() + 1) / 7);
  return `${d.getFullYear()}-W${String(week).padStart(2,'0')}`;
}

function paceToSec(p) {
  if (!p) return null;
  const [m, s] = p.split(':').map(Number);
  return m * 60 + (s || 0);
}

function secToPace(s) {
  if (!s) return '—';
  return `${Math.floor(s/60)}:${String(Math.round(s%60)).padStart(2,'0')}`;
}

function fmtHrs(mins) {
  const h = Math.floor(mins / 60);
  const m = Math.round(mins % 60);
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
}

Chart.defaults.color = '#6b6b78';
Chart.defaults.borderColor = '#1f1f24';
Chart.defaults.font.family = "'DM Mono', monospace";
Chart.defaults.font.size = 10;

function chartOpts(extra = {}) {
  return {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false }, tooltip: {
      backgroundColor: '#141417', borderColor: '#1f1f24', borderWidth: 1,
      titleColor: '#eeeef4', bodyColor: '#c8c8d4', padding: 10,
    }},
    scales: {
      x: { grid: { color: '#1f1f24' }, ticks: { maxRotation: 0 } },
      y: { grid: { color: '#1f1f24' } }
    },
    ...extra
  };
}

// ── Best efforts ─────────────────────────────────────────────────────────────
function calcBestEfforts(runs) {
  const cats = [
    { label: '5 km',       min: 4,  max: 6,     unit: 'pace' },
    { label: '10 km',      min: 8,  max: 12,    unit: 'pace' },
    { label: 'Half',       min: 18, max: 23,    unit: 'pace' },
    { label: 'Marathon',   min: 38, max: 45,    unit: 'pace' },
    { label: '50 km',      min: 45, max: 60,    unit: 'pace' },
    { label: 'Longest',    min: 0,  max: 99999, unit: 'distance' },
  ];

  return cats.map(cat => {
    if (cat.unit === 'distance') {
      const best = runs.reduce((a, b) =>
        (parseFloat(a.distance_km) || 0) > (parseFloat(b.distance_km) || 0) ? a : b, runs[0]);
      return { ...cat, value: fmt(best?.distance_km, 1) + ' km', date: best?.date, sub: best?.name || '' };
    }
    const eligible = runs.filter(r => {
      const d = parseFloat(r.distance_km);
      return d >= cat.min && d <= cat.max && r.avg_pace_min_km;
    });
    if (!eligible.length) return { ...cat, value: '—', date: null, sub: 'no data yet' };
    const best = eligible.reduce((a, b) =>
      paceToSec(a.avg_pace_min_km) < paceToSec(b.avg_pace_min_km) ? a : b);
    return { ...cat, value: best.avg_pace_min_km + ' /km',
      date: best.date, sub: fmt(best.distance_km) + ' km · ' + (best.name || '') };
  });
}

// ── Main ─────────────────────────────────────────────────────────────────────
async function init() {
  const [runsRaw, strengthRaw, summary] = await Promise.all([
    fetch('runs.csv').then(r => r.text()),
    fetch('strength.csv').then(r => r.text()).catch(() => null),
    fetch('summary.json').then(r => r.json()).catch(() => null)
  ]);

  const { data: runRows } = Papa.parse(runsRaw, { header: true, skipEmptyLines: true });
  const runs = runRows.filter(r => r.date);

  let sessions = [];
  if (strengthRaw) {
    const { data: sRows } = Papa.parse(strengthRaw, { header: true, skipEmptyLines: true });
    sessions = sRows.filter(r => r.date);
  }

  if (summary) $('last-updated').textContent = `Updated ${summary.last_updated}`;

  const app = $('app');
  app.innerHTML = '';

  const today = new Date();
  const thisYear = today.getFullYear().toString();
  const thisMonth = today.toLocaleString('en', { month: 'short' });

  const yearRuns = runs.filter(r => r.date.startsWith(thisYear));
  const yearDist = yearRuns.reduce((s, r) => s + (parseFloat(r.distance_km) || 0), 0);
  const allDist = runs.reduce((s, r) => s + (parseFloat(r.distance_km) || 0), 0);
  const yearSessions = sessions.filter(s => s.date.startsWith(thisYear));
  const totalStrengthMinYear = yearSessions.reduce((s, r) => s + (parseFloat(r.duration_min) || 0), 0);

  // Weekly sets for averages
  const runWeeksYear = new Set(yearRuns.map(r => isoWeek(r.date)));
  const sWeeksYear = new Set(yearSessions.map(s => isoWeek(s.date)));
  const numRunWeeks = Math.max(runWeeksYear.size, 1);
  const numSWeeks = Math.max(sWeeksYear.size, 1);

  const avgRunDistPerWeek = yearDist / numRunWeeks;
  const avgRunDistPerRun = yearDist / Math.max(yearRuns.length, 1);
  const avgSessPerWeek = yearSessions.length / numRunWeeks;

  // Monthly averages
  const monthRuns = yearRuns.filter(r => new Date(r.date + 'T00:00:00').toLocaleString('en', { month: 'short' }) === thisMonth);
  const monthSessions = yearSessions.filter(s => new Date(s.date + 'T00:00:00').toLocaleString('en', { month: 'short' }) === thisMonth);
  const monthRunMins = monthRuns.reduce((s, r) => {
    const parts = (r.moving_time || '').split(':').map(Number);
    return s + (parts[0] * 60 + (parts[1] || 0) + (parts[2] || 0) / 60);
  }, 0);
  const monthStrengthMins = monthSessions.reduce((s, r) => s + (parseFloat(r.duration_min) || 0), 0);

  // Total running minutes this year (from moving_time)
  const totalRunMinsYear = yearRuns.reduce((s, r) => {
    const parts = (r.moving_time || '').split(':').map(Number);
    return s + (parts[0] * 60 + (parts[1] || 0) + (parts[2] || 0) / 60);
  }, 0);

  const totalActivityMinsYear = totalRunMinsYear + totalStrengthMinYear;
  const avgActivityMinsPerWeek = totalActivityMinsYear / numRunWeeks;
  const weeksInMonth = monthRuns.length > 0
    ? new Set(monthRuns.map(r => isoWeek(r.date))).size || 1 : 1;
  const avgActivityMinsPerWeekMonth = (monthRunMins + monthStrengthMins) / weeksInMonth;

  // ── Combined overview ──────────────────────────────────────────────────────
  const overview = document.createElement('div');
  overview.className = 'overview';
  overview.innerHTML = `
    <div class="overview-half">
      <div class="overview-label run">Running</div>
      <div class="stat">
        <span class="stat-label">Runs ${thisYear}</span>
        <span class="stat-value accent">${summary?.total_runs_this_year ?? yearRuns.length}</span>
        <span class="stat-sub">${summary?.total_runs_all_time ?? runs.length} all time</span>
      </div>
      <div class="stat">
        <span class="stat-label">Distance ${thisYear}</span>
        <span class="stat-value">${fmt(summary?.total_distance_this_year_km ?? yearDist, 0)} <small style="font-size:.9rem;color:var(--text-dim)">km</small></span>
        <span class="stat-sub">${fmt(allDist, 0)} km all time</span>
      </div>
      <div class="stat">
        <span class="stat-label">Avg dist / run</span>
        <span class="stat-value">${fmt(avgRunDistPerRun, 1)} <small style="font-size:.9rem;color:var(--text-dim)">km</small></span>
        <span class="stat-sub">${fmt(avgRunDistPerWeek, 1)} km / week</span>
      </div>
      <div class="stat">
        <span class="stat-label">Weekly streak</span>
        <span class="stat-value accent">${summary?.current_weekly_streak ?? '—'} <small style="font-size:.9rem;color:var(--text-dim)">wks</small></span>
        <span class="stat-sub">Best: ${summary?.longest_weekly_streak ?? '—'} wks</span>
      </div>
      <div class="stat">
        <span class="stat-label">Last run</span>
        <span class="stat-value" style="font-size:1.2rem">${runs[0]?.date ?? '—'}</span>
        <span class="stat-sub">${fmt(runs[0]?.distance_km)} km · ${runs[0]?.avg_pace_min_km ?? '—'} /km</span>
      </div>
    </div>
    <div class="overview-divider"></div>
    <div class="overview-half">
      <div class="overview-label lift">Strength</div>
      <div class="stat">
        <span class="stat-label">Sessions ${thisYear}</span>
        <span class="stat-value blue">${summary?.total_strength_this_year ?? yearSessions.length}</span>
        <span class="stat-sub">${summary?.total_strength_all_time ?? sessions.length} all time</span>
      </div>
      <div class="stat">
        <span class="stat-label">Hours ${thisYear}</span>
        <span class="stat-value">${(totalStrengthMinYear / 60).toFixed(1)} <small style="font-size:.9rem;color:var(--text-dim)">hrs</small></span>
        <span class="stat-sub">${Math.round(totalStrengthMinYear)} mins total</span>
      </div>
      <div class="stat">
        <span class="stat-label">Avg / week</span>
        <span class="stat-value">${fmt(avgSessPerWeek, 1)}</span>
        <span class="stat-sub">${fmt(avgSessPerWeek * 4.3, 1)} sessions / month</span>
      </div>
      <div class="stat">
        <span class="stat-label">Weekly streak</span>
        <span class="stat-value blue">${summary?.current_strength_weekly_streak ?? '—'} <small style="font-size:.9rem;color:var(--text-dim)">wks</small></span>
        <span class="stat-sub">Best: ${summary?.longest_strength_weekly_streak ?? '—'} wks</span>
      </div>
      <div class="stat">
        <span class="stat-label">Last session</span>
        <span class="stat-value" style="font-size:1.2rem">${sessions[0]?.date ?? '—'}</span>
        <span class="stat-sub">${sessions[0]?.elapsed_time ?? '—'} · ${sessions[0]?.calories ? sessions[0].calories + ' kcal' : '—'}</span>
      </div>
    </div>
  `;
  app.appendChild(overview);

  // ── Combined activity time card ────────────────────────────────────────────
  const timeCard = document.createElement('div');
  timeCard.className = 'time-card';
  timeCard.innerHTML = `
    <div class="time-stat">
      <span class="stat-label" style="font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-dim)">Total activity ${thisYear}</span>
      <span class="stat-value orange" style="font-family:var(--font-display);font-size:1.8rem;font-weight:700;color:var(--accent2);line-height:1">${fmtHrs(totalActivityMinsYear)}</span>
      <span class="stat-sub" style="font-size:11px;color:var(--text-dim);font-family:var(--font-mono)">running + strength combined</span>
    </div>
    <div class="time-stat">
      <span class="stat-label" style="font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-dim)">Avg / week (${thisYear})</span>
      <span class="stat-value" style="font-family:var(--font-display);font-size:1.8rem;font-weight:700;color:var(--text-hi);line-height:1">${fmtHrs(avgActivityMinsPerWeek)}</span>
      <span class="stat-sub" style="font-size:11px;color:var(--text-dim);font-family:var(--font-mono)">${fmtHrs(totalRunMinsYear / numRunWeeks)} run · ${fmtHrs(totalStrengthMinYear / numSWeeks)} lift</span>
    </div>
    <div class="time-stat">
      <span class="stat-label" style="font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-dim)">Avg / week (${thisMonth})</span>
      <span class="stat-value" style="font-family:var(--font-display);font-size:1.8rem;font-weight:700;color:var(--text-hi);line-height:1">${fmtHrs(avgActivityMinsPerWeekMonth)}</span>
      <span class="stat-sub" style="font-size:11px;color:var(--text-dim);font-family:var(--font-mono)">${fmtHrs(monthRunMins / weeksInMonth)} run · ${fmtHrs(monthStrengthMins / weeksInMonth)} lift</span>
    </div>
    <div class="time-stat">
      <span class="stat-label" style="font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-dim)">Running ${thisYear}</span>
      <span class="stat-value" style="font-family:var(--font-display);font-size:1.8rem;font-weight:700;color:var(--text-hi);line-height:1">${fmtHrs(totalRunMinsYear)}</span>
      <span class="stat-sub" style="font-size:11px;color:var(--text-dim);font-family:var(--font-mono)">${fmtHrs(totalRunMinsYear / numRunWeeks)} / week avg</span>
    </div>
    <div class="time-stat">
      <span class="stat-label" style="font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-dim)">Strength ${thisYear}</span>
      <span class="stat-value" style="font-family:var(--font-display);font-size:1.8rem;font-weight:700;color:var(--text-hi);line-height:1">${fmtHrs(totalStrengthMinYear)}</span>
      <span class="stat-sub" style="font-size:11px;color:var(--text-dim);font-family:var(--font-mono)">${fmtHrs(totalStrengthMinYear / numSWeeks)} / week avg</span>
    </div>
  `;
  app.appendChild(timeCard);

  // ── Running section ────────────────────────────────────────────────────────
  const runHeading = document.createElement('div');
  runHeading.className = 'section-heading';
  runHeading.textContent = 'Running';
  app.appendChild(runHeading);

  // Best efforts
  const efforts = calcBestEfforts(runs.filter(r => r.type === 'outdoor'));
  const effortsCard = document.createElement('div');
  effortsCard.className = 'card';
  effortsCard.innerHTML = `
    <div class="card-title">Personal bests — by distance category</div>
    <div class="efforts-grid">
      ${efforts.map(e => `
        <div class="effort">
          <div class="effort-label">${e.label}</div>
          <div class="effort-value">${e.value}</div>
          <div class="effort-sub">${e.sub ?? ''}</div>
          <div class="effort-date">${e.date ?? ''}</div>
        </div>
      `).join('')}
    </div>
  `;
  app.appendChild(effortsCard);

  // Distance progress + weekly load
  const targetKm = 2000;
  const pct = Math.min(100, (yearDist / targetKm) * 100);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const monthDist = Array(12).fill(0);
  yearRuns.forEach(r => {
    const mo = new Date(r.date + 'T00:00:00').getMonth();
    monthDist[mo] += parseFloat(r.distance_km) || 0;
  });
  const currentMonth = today.getMonth();
  const monthLabels = months.slice(0, currentMonth + 1);
  const monthData = monthDist.slice(0, currentMonth + 1);

  const weekMap = {};
  runs.forEach(r => {
    const wk = isoWeek(r.date);
    if (!weekMap[wk]) weekMap[wk] = { load: 0 };
    weekMap[wk].load += parseFloat(r.training_load) || 0;
  });
  const weekKeys = Object.keys(weekMap).sort().slice(-16);
  const weekLoads = weekKeys.map(k => parseFloat(weekMap[k].load.toFixed(0)));
  const weekLabelsRun = weekKeys.map(k => k.split('-')[1]);

  const grid1 = document.createElement('div');
  grid1.className = 'grid-2';

  const yearCard = document.createElement('div');
  yearCard.className = 'card';
  yearCard.innerHTML = `
    <div class="card-title">Distance ${thisYear}</div>
    <div>
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.25rem">
        <span style="font-family:var(--font-mono);font-size:11px;color:var(--text-dim)">Progress to ${targetKm.toLocaleString()} km</span>
        <span style="font-family:var(--font-display);font-size:1.4rem;color:var(--accent)">${fmt(pct, 0)}%</span>
      </div>
      <div class="year-bar-track"><div class="year-bar-fill" style="width:${pct}%"></div></div>
      <div class="year-bar-labels"><span>${fmt(yearDist, 0)} km done</span><span>${fmt(targetKm - yearDist, 0)} km to go</span></div>
    </div>
    <div class="chart-wrap" style="margin-top:1.5rem;height:155px"><canvas id="monthChart"></canvas></div>
  `;
  grid1.appendChild(yearCard);

  const loadCard = document.createElement('div');
  loadCard.className = 'card';
  loadCard.innerHTML = `
    <div class="card-title">Weekly training load — last 16 weeks</div>
    <div class="chart-wrap"><canvas id="loadChart"></canvas></div>
  `;
  grid1.appendChild(loadCard);
  app.appendChild(grid1);

  // Pace & HR + VO2
  const outdoorRuns = runs.filter(r => r.type === 'outdoor' && r.avg_pace_min_km && r.avg_hr).slice(0, 20).reverse();
  const vo2Runs = runs.filter(r => r.vo2max_estimate && parseFloat(r.vo2max_estimate) > 0).slice(0, 30).reverse();

  const grid2 = document.createElement('div');
  grid2.className = 'grid-2';

  const paceCard = document.createElement('div');
  paceCard.className = 'card';
  paceCard.innerHTML = `
    <div class="card-title">Pace & heart rate — last 20 outdoor runs</div>
    <div class="chart-wrap"><canvas id="paceChart"></canvas></div>
  `;
  grid2.appendChild(paceCard);

  const vo2Card = document.createElement('div');
  vo2Card.className = 'card';
  vo2Card.innerHTML = `
    <div class="card-title">VO₂ max estimate over time</div>
    <div class="chart-wrap"><canvas id="vo2Chart"></canvas></div>
  `;
  grid2.appendChild(vo2Card);
  app.appendChild(grid2);

  // ── Strength section ───────────────────────────────────────────────────────
  const liftHeading = document.createElement('div');
  liftHeading.className = 'section-heading lift';
  liftHeading.textContent = 'Strength Training';
  app.appendChild(liftHeading);

  const sWeekMap = {};
  sessions.forEach(s => {
    const wk = isoWeek(s.date);
    if (!sWeekMap[wk]) sWeekMap[wk] = { count: 0, mins: 0 };
    sWeekMap[wk].count++;
    sWeekMap[wk].mins += parseFloat(s.duration_min) || 0;
  });
  const sWeekKeys = Object.keys(sWeekMap).sort().slice(-16);
  const sWeekCounts = sWeekKeys.map(k => sWeekMap[k].count);
  const sWeekMins = sWeekKeys.map(k => parseFloat(sWeekMap[k].mins.toFixed(0)));
  const sWeekLabels = sWeekKeys.map(k => k.split('-')[1]);

  const grid3 = document.createElement('div');
  grid3.className = 'grid-2';

  const sCountCard = document.createElement('div');
  sCountCard.className = 'card';
  sCountCard.innerHTML = `
    <div class="card-title">Weekly sessions — last 16 weeks</div>
    <div class="chart-wrap"><canvas id="strengthCountChart"></canvas></div>
  `;
  grid3.appendChild(sCountCard);

  const sMinsCard = document.createElement('div');
  sMinsCard.className = 'card';
  sMinsCard.innerHTML = `
    <div class="card-title">Weekly training time — last 16 weeks</div>
    <div class="chart-wrap"><canvas id="strengthMinsChart"></canvas></div>
  `;
  grid3.appendChild(sMinsCard);
  app.appendChild(grid3);

  // Monthly strength summary
  const monthlyMap = {};
  yearSessions.forEach(s => {
    const mo = new Date(s.date + 'T00:00:00').toLocaleString('en', { month: 'short' });
    if (!monthlyMap[mo]) monthlyMap[mo] = { count: 0, mins: 0 };
    monthlyMap[mo].count++;
    monthlyMap[mo].mins += parseFloat(s.duration_min) || 0;
  });

  const monthlyCard = document.createElement('div');
  monthlyCard.className = 'card';
  monthlyCard.innerHTML = `
    <div class="card-title">Monthly strength summary ${thisYear}</div>
    <table class="runs-table">
      <thead><tr><th>Month</th><th>Sessions</th><th>Total time</th><th>Avg session</th></tr></thead>
      <tbody>
        ${Object.entries(monthlyMap).map(([mo, d]) => `
          <tr>
            <td class="mono" style="color:var(--text-dim)">${mo}</td>
            <td class="mono">${d.count}</td>
            <td class="mono">${Math.round(d.mins)} min</td>
            <td class="mono">${Math.round(d.mins / d.count)} min</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
  app.appendChild(monthlyCard);

  // ── Charts ─────────────────────────────────────────────────────────────────
  requestAnimationFrame(() => {
    new Chart($('monthChart'), {
      type: 'bar',
      data: { labels: monthLabels, datasets: [{ data: monthData.map(v => parseFloat(v.toFixed(1))),
        backgroundColor: monthData.map((_, i) => i === currentMonth ? 'rgba(232,255,90,0.85)' : 'rgba(232,255,90,0.2)'),
        borderRadius: 2 }] },
      options: { ...chartOpts(), scales: {
        x: { grid: { display: false }, ticks: { color: '#6b6b78' } },
        y: { grid: { color: '#1f1f24' }, ticks: { callback: v => `${v}km` } }
      }, plugins: { ...chartOpts().plugins, tooltip: { ...chartOpts().plugins.tooltip,
        callbacks: { label: ctx => ` ${ctx.parsed.y} km` } }} }
    });

    new Chart($('loadChart'), {
      type: 'bar',
      data: { labels: weekLabelsRun, datasets: [{ data: weekLoads,
        backgroundColor: weekLoads.map((v, i) => {
          if (i === weekLoads.length - 1) return 'rgba(255,107,53,0.85)';
          const max = Math.max(...weekLoads);
          return `rgba(232,255,90,${0.15 + (max ? v/max : 0) * 0.65})`;
        }), borderRadius: 2 }] },
      options: { ...chartOpts(), scales: {
        x: { grid: { display: false }, ticks: { color: '#6b6b78' } },
        y: { grid: { color: '#1f1f24' }, ticks: { color: '#6b6b78' } }
      }, plugins: { ...chartOpts().plugins, tooltip: { ...chartOpts().plugins.tooltip,
        callbacks: { label: ctx => ` Load: ${ctx.parsed.y}` } }} }
    });

    new Chart($('paceChart'), {
      type: 'line',
      data: { labels: outdoorRuns.map(r => r.date.slice(5)), datasets: [
        { label: 'Pace', data: outdoorRuns.map(r => paceToSec(r.avg_pace_min_km)),
          borderColor: 'rgba(232,255,90,0.8)', backgroundColor: 'rgba(232,255,90,0.06)',
          pointBackgroundColor: 'rgba(232,255,90,0.9)', pointRadius: 3, tension: 0.3, fill: true, yAxisID: 'yPace' },
        { label: 'Avg HR', data: outdoorRuns.map(r => parseFloat(r.avg_hr) || null),
          borderColor: 'rgba(255,107,53,0.8)', backgroundColor: 'transparent',
          pointBackgroundColor: 'rgba(255,107,53,0.9)', pointRadius: 3, tension: 0.3, yAxisID: 'yHR' }
      ] },
      options: { responsive: true, maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: { legend: { display: true, labels: { color: '#6b6b78', boxWidth: 10, font: { size: 10 } } },
          tooltip: { backgroundColor: '#141417', borderColor: '#1f1f24', borderWidth: 1,
            titleColor: '#eeeef4', bodyColor: '#c8c8d4', padding: 10,
            callbacks: { label: ctx => ctx.datasetIndex === 0
              ? ` Pace: ${secToPace(ctx.parsed.y)} /km` : ` HR: ${ctx.parsed.y} bpm` } } },
        scales: {
          x: { grid: { display: false }, ticks: { color: '#6b6b78', maxTicksLimit: 8 } },
          yPace: { position: 'left', reverse: true, grid: { color: '#1f1f24' },
            ticks: { color: '#6b6b78', callback: v => secToPace(v) } },
          yHR: { position: 'right', grid: { display: false },
            ticks: { color: '#6b6b78', callback: v => `${v}bpm` } }
        }
      }
    });

    if (vo2Runs.length > 1) {
      new Chart($('vo2Chart'), {
        type: 'line',
        data: { labels: vo2Runs.map(r => r.date.slice(5)), datasets: [{
          data: vo2Runs.map(r => parseFloat(r.vo2max_estimate)),
          borderColor: 'rgba(74,158,255,0.8)', backgroundColor: 'rgba(74,158,255,0.06)',
          pointBackgroundColor: 'rgba(74,158,255,0.9)', pointRadius: 3, tension: 0.4, fill: true }] },
        options: { ...chartOpts(), scales: {
          x: { grid: { display: false }, ticks: { color: '#6b6b78' } },
          y: { grid: { color: '#1f1f24' }, ticks: { color: '#6b6b78' },
            title: { display: true, text: 'mL/kg/min', color: '#3a3a42' } }
        }, plugins: { ...chartOpts().plugins, tooltip: { ...chartOpts().plugins.tooltip,
          callbacks: { label: ctx => ` VO₂ max: ${ctx.parsed.y}` } }} }
      });
    }

    new Chart($('strengthCountChart'), {
      type: 'bar',
      data: { labels: sWeekLabels, datasets: [{ data: sWeekCounts,
        backgroundColor: sWeekCounts.map((_, i) =>
          i === sWeekCounts.length - 1 ? 'rgba(255,107,53,0.85)' : 'rgba(74,158,255,0.25)'),
        borderRadius: 2 }] },
      options: { ...chartOpts(), scales: {
        x: { grid: { display: false }, ticks: { color: '#6b6b78' } },
        y: { grid: { color: '#1f1f24' }, ticks: { color: '#6b6b78', stepSize: 1 } }
      }, plugins: { ...chartOpts().plugins, tooltip: { ...chartOpts().plugins.tooltip,
        callbacks: { label: ctx => ` ${ctx.parsed.y} session${ctx.parsed.y !== 1 ? 's' : ''}` } }} }
    });

    new Chart($('strengthMinsChart'), {
      type: 'bar',
      data: { labels: sWeekLabels, datasets: [{ data: sWeekMins,
        backgroundColor: sWeekMins.map((_, i) =>
          i === sWeekMins.length - 1 ? 'rgba(255,107,53,0.85)' : 'rgba(74,158,255,0.25)'),
        borderRadius: 2 }] },
      options: { ...chartOpts(), scales: {
        x: { grid: { display: false }, ticks: { color: '#6b6b78' } },
        y: { grid: { color: '#1f1f24' }, ticks: { color: '#6b6b78', callback: v => `${v}m` } }
      }, plugins: { ...chartOpts().plugins, tooltip: { ...chartOpts().plugins.tooltip,
        callbacks: { label: ctx => ` ${ctx.parsed.y} mins` } }} }
    });
  });
}

init().catch(err => {
  document.getElementById('app').innerHTML =
    `<div class="loading">Failed to load data.<br><small>${err.message}</small></div>`;
});
</script>
</body>
</html>
