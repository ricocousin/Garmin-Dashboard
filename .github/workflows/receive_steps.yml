name: Receive Steps Data

on:
  repository_dispatch:
    types: [health-steps]
  workflow_dispatch:

jobs:
  save:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Parse and save steps data
        run: |
          python3 << 'EOF'
          import json, os, csv

          payload = os.environ.get('PAYLOAD', '[]')
          try:
              entries = json.loads(payload)
          except Exception as e:
              print(f"JSON parse error: {e}")
              exit(0)

          if not entries:
              print("No step data found")
              exit(0)

          existing = {}
          if os.path.exists('steps.csv'):
              with open('steps.csv', 'r') as f:
                  reader = csv.DictReader(f)
                  for row in reader:
                      existing[row['date']] = int(row['steps'])

          for entry in entries:
              existing[entry['date']] = int(entry['steps'])

          with open('steps.csv', 'w', newline='') as f:
              writer = csv.DictWriter(f, fieldnames=['date', 'steps'])
              writer.writeheader()
              for date in sorted(existing.keys(), reverse=True):
                  writer.writerow({'date': date, 'steps': existing[date]})

          print(f"Saved {len(entries)} entries, {len(existing)} total in steps.csv")
          EOF
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload.
