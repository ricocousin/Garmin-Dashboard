name: Receive Steps Data

on:
  repository_dispatch:
    types: [health-steps]
  workflow_dispatch:

jobs:
  save:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Parse and save steps data
        run: |
          python3 << 'EOF'
          import json, os, csv
          from datetime import datetime

          payload = os.environ.get('PAYLOAD', '{}')
          data = json.loads(payload)

          # Extract step entries from Health Auto Export format
          metrics = data.get('data', {}).get('metrics', [])
          entries = []
          for metric in metrics:
              if metric.get('name') == 'step_count':
                  for entry in metric.get('data', []):
                      raw_date = entry.get('date', '')
                      qty = entry.get('qty', 0)
                      # Parse date — format: "2026-06-22 00:00:00 +0200"
                      date_str = raw_date[:10]  # just YYYY-MM-DD
                      entries.append((date_str, int(qty)))

          if not entries:
              print("No step data found in payload")
              exit(0)

          # Load existing steps.csv
          existing = {}
          if os.path.exists('steps.csv'):
              with open('steps.csv', 'r') as f:
                  reader = csv.DictReader(f)
                  for row in reader:
                      existing[row['date']] = int(row['steps'])

          # Merge — new data overwrites existing for same date
          for date_str, qty in entries:
              existing[date_str] = qty

          # Write sorted descending
          with open('steps.csv', 'w', newline='') as f:
              writer = csv.DictWriter(f, fieldnames=['date', 'steps'])
              writer.writeheader()
              for date in sorted(existing.keys(), reverse=True):
                  writer.writerow({'date': date, 'steps': existing[date]})

          print(f"Saved {len(entries)} entries, {len(existing)} total in steps.csv")
          EOF
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload) }}

      - name: Commit steps
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add steps.csv
          git diff --staged --quiet || git commit -m "Update steps data"
          git push
