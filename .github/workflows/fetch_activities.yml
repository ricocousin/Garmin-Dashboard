name: Fetch Garmin Activities

on:
  schedule:
    - cron: '0 5 * * *'     # daily incremental
    - cron: '0 4 1-7 * 0'    # first Sunday of each month
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install garminconnect

      - name: Run fetch script
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python fetch_activities.py

      - name: Commit and push data files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add runs.csv summary.json strength.csv lactate.json coach_summary.json api_usage.json
          git diff --staged --quiet || git commit -m "Update activity data"
          git push

